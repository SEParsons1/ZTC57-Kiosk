<!doctype html>
<html>

<style>

  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);

  pointer-events: none;
}
.app-tile {
  position: fixed;
  transform: translate(-50%, -50%);
  text-decoration: none;
  color: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-width: 120px;
  padding: 12px;

.app-left {
  left: 84px;
  bottom: 36px;
  transform: none;
}
.app-right {
  right: 24px;
  bottom: 36px;
  transform: none;
}
.app-tile img {
  width: 76px;
  height: 76px;
  object-fit: contain;
}
.app-tile span {
  font-size: 19px;
  line-height: 1.2;
  text-align: center;
}

</head>

<img class="logo" src="file:///sdcard/Pictures/4cd6ffbd-8677-427d-9298-b0f45e94fd32.jpg">

  <img src="assets/shiptrackplus.png" alt="ShipTrack+">

<a class="app-tile app-right" href="intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.companyname.purolatorscanning;end">
