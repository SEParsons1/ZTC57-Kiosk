<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: white;
  overflow: hidden;
  font-family: Arial, sans-serif;
}
body {
  position: relative;
}
.logo {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 220px;
  pointer-events: none;
}
.launcher-bar {
  position: fixed;
  inset: auto 0 18px 0;
  height: 160px;
  z-index: 2;
}
.app-tile {
  position: absolute;
  bottom: 0;
  text-decoration: none;
  color: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 8px 4px;
  background: transparent;
  -webkit-tap-highlight-color: transparent;
}
.app-tile-left {
  left: 10px;
  width: 110px;
}
.app-tile-right {
  right: 10px;
  width: 150px;
}
.app-tile img {
  width: 76px;
  height: 76px;
  object-fit: contain;
}
.app-tile span {
  font-size: 16px;
  line-height: 1.2;
  text-align: center;
  display: block;
  width: 100%;
}
</style>
</head>
<body>
<img class="logo" src="file:///sdcard/Pictures/4cd6ffbd-8677-427d-9298-b0f45e94fd32.jpg">
<div class="launcher-bar">
  <a class="app-tile app-tile-left" href="#" data-package="com.shiptrack.app">
    <img src="assets/shiptrackplus.png" alt="ShipTrack+">
    <span>ShipTrack+</span>
  </a>
  <a class="app-tile app-tile-right" href="#" data-package="com.companyname.purolatorscanning">
    <img src="assets/purolator.png" alt="Purolator Scanning">
    <span>Purolator Scanning</span>
  </a>
</div>
<script>
document.querySelectorAll(".app-tile").forEach(function (tile) {
  tile.addEventListener("click", function (event) {
    event.preventDefault();
    var packageName = tile.dataset.package;
    window.location.href =
      "intent://launch/#Intent;package=" + packageName + ";end";
  });
});
</script>
</body>
</html>
